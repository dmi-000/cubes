    flex: 1; min-width: 0; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 4px; padding: 6px 10px;
    font: 15px ui-monospace, "SF Mono", Menlo, monospace;
  }
  .seedbar button, .chip {
    background: none; border: 1px solid var(--line); color: var(--text);
    border-radius: 4px; padding: 5px 10px; font: inherit; font-size: 13px; cursor: pointer;
  }
  .seedbar button:hover, .chip:hover { border-color: #46506a; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chip { font-size: 12px; color: var(--muted); padding: 3px 9px; }
  .chip b { color: var(--text); font-variant-numeric: tabular-nums; }
  .chip.active { border-color: #93a0b8; color: var(--text); }
  .big {
    font-size: 40px; font-weight: 650; font-variant-numeric: tabular-nums;
    line-height: 1.05; margin-top: 10px;
  }
  .big small { font-size: 13.5px; font-weight: 400; color: var(--muted); margin-left: 8px; }
  .status { color: var(--muted); font-size: 13px; margin-top: 4px; }
  h2 { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin: 0 0 10px; font-weight: 600; }
  .bars { display: grid; grid-template-columns: 5.2em 1fr 3.2em; gap: 5px 8px; align-items: center; }
  .bars .lab { color: var(--muted); font-size: 12.5px; }
  .bars .bar { height: 9px; border-radius: 2px; background: #3b4456; position: relative; overflow: hidden; }
  .bars .bar i { position: absolute; inset: 0 auto 0 0; background: #93a0b8; display: block; border-radius: 2px; }
  .bars .val { font: 12.5px ui-monospace, Menlo, monospace; text-align: right; font-variant-numeric: tabular-nums; }
  .nobars { color: var(--muted); font-size: 13px; }
  .cube-row { display: flex; align-items: baseline; gap: 9px; padding: 5px 0; border-bottom: 1px solid var(--line); cursor: pointer; }
  .cube-row:last-child { border-bottom: none; }
  .sw { width: 11px; height: 11px; border-radius: 2px; flex: 0 0 auto; align-self: center; }
  .cube-row .q { font: 12px ui-monospace, Menlo, monospace; color: var(--muted); font-variant-numeric: tabular-nums; margin-left: auto; white-space: nowrap; }
  .cube-row input { accent-color: #93a0b8; align-self: center; }
  .cube-row.off .q, .cube-row.off .name { opacity: 0.35; }
  .cube-row.off .sw { opacity: 0.25; }
  .controls { display: flex; flex-direction: column; gap: 10px; }
  .ctl { display: flex; align-items: center; gap: 10px; font-size: 13.5px; color: var(--muted); }
  .ctl input[type=range] { flex: 1; accent-color: #93a0b8; }
  :focus-visible { outline: 2px solid #93a0b8; outline-offset: 2px; }
  footer { color: var(--muted); font-size: 12px; margin-top: auto; line-height: 1.55; }
  footer code { font: 11.5px ui-monospace, Menlo, monospace; }
  @media (max-width: 760px) {
    .app { flex-direction: column; height: auto; }
    .stage { height: 58vh; }
    aside { width: auto; border-left: none; border-top: 1px solid var(--line); }

// ---- numpy MT19937 + legacy polar Gaussian + scipy Rotation.random,
// ---- ported from mt_sim.py (validated: 66 seeds, 0 mismatches).
// NOTE: Math.log/sqrt could differ from C libm by an ulp; harmless for
// round(c*512) except on exact-half boundaries (never observed).
function MT(seed) {
  const mt = new Uint32Array(624);
  mt[0] = seed >>> 0;
  for (let i = 1; i < 624; i++) {
    const s = (mt[i - 1] ^ (mt[i - 1] >>> 30)) >>> 0;
    mt[i] = ((((s >>> 16) * 1812433253) << 16) + (s & 0xffff) * 1812433253 + i) >>> 0;
  }
  let idx = 624, hasG = false, gVal = 0;
  function u32() {
    if (idx >= 624) {
      for (let i = 0; i < 624; i++) {
        const y = ((mt[i] & 0x80000000) | (mt[(i + 1) % 624] & 0x7fffffff)) >>> 0;
        mt[i] = (mt[(i + 397) % 624] ^ (y >>> 1)) >>> 0;
        if (y & 1) mt[i] = (mt[i] ^ 0x9908b0df) >>> 0;
      }
      idx = 0;
    }
    let y = mt[idx++];
    y ^= y >>> 11;
    y = (y ^ ((y << 7) & 0x9d2c5680)) >>> 0;
    y = (y ^ ((y << 15) & 0xefc60000)) >>> 0;
    return (y ^ (y >>> 18)) >>> 0;
  }
  function dbl() {
    const a = u32() >>> 5, b = u32() >>> 6;
    return (a * 67108864 + b) / 9007199254740992;
  }
  function gauss() {
    if (hasG) { hasG = false; return gVal; }
    let x1, x2, r2;
    do {
      x1 = 2 * dbl() - 1;
      x2 = 2 * dbl() - 1;
      r2 = x1 * x1 + x2 * x2;
    } while (r2 >= 1 || r2 === 0);
    const f = Math.sqrt(-2 * Math.log(r2) / r2);
    gVal = f * x1; hasG = true;
    return f * x2;
  }
  return { gauss };
}

function gcd2(a, b) { a = Math.abs(a); b = Math.abs(b); while (b) { [a, b] = [b, a % b]; } return a; }

function seedQuats(seed, n = 6, scale = 512) {
  const rng = MT(seed);
  const out = [];
  for (let k = 0; k < n; k++) {
    const x = rng.gauss(), y = rng.gauss(), z = rng.gauss(), w = rng.gauss();
    const nr = Math.sqrt(x * x + y * y + z * z + w * w);
    let q = [w / nr, x / nr, y / nr, z / nr];
    let m = 0;
    for (let i = 1; i < 4; i++) if (Math.abs(q[i]) > Math.abs(q[m])) m = i;
    if (q[m] < 0) q = q.map(c => -c);
    let ints = q.map(c => Math.round(c * scale));
    const g = ints.reduce((a, b) => gcd2(a, b));
    if (g > 1) ints = ints.map(i => i / g);
    out.push(ints);
  }
  return out;
}

function quatToMat(q) {
  const [a, b, c, d] = q;
  const n = a * a + b * b + c * c + d * d;
  return [
    [(a * a + b * b - c * c - d * d) / n, 2 * (b * c - a * d) / n, 2 * (b * d + a * c) / n],
    [2 * (b * c + a * d) / n, (a * a - b * b + c * c - d * d) / n, 2 * (c * d - a * b) / n],
    [2 * (b * d - a * c) / n, 2 * (c * d + a * b) / n, (a * a - b * b - c * c + d * d) / n]];
}

function loadSeed(seed) {
  seed = Math.max(0, Math.floor(seed)) >>> 0;
  document.getElementById('seed').value = seed;
  const quats = seedQuats(seed);
  world = quats.map(q => {
    const M = quatToMat(q);
    return corners.map(v => [
      M[0][0]*v[0] + M[0][1]*v[1] + M[0][2]*v[2],
      M[1][0]*v[0] + M[1][1]*v[1] + M[1][2]*v[2],
      M[2][0]*v[0] + M[2][1]*v[1] + M[2][2]*v[2]]);
  });
  const rec = COUNTS[seed];
  const countEl = document.getElementById('count');
  const statusEl = document.getElementById('status');
  const bars = document.getElementById('bars');
  bars.innerHTML = '';
  if (rec) {
    countEl.innerHTML = `${rec[0]}<small>bounded regions, exact</small>`;
    statusEl.textContent = rec[0] % 4 === 3
      ? 'certified · ≡ 3 (mod 4) as the generic law requires'
      : 'certified · deviates from 3 (mod 4)!';

    } else {
      bars.insertAdjacentHTML('beforeend',

function project() {
  const cy = Math.cos(yaw), sy = Math.sin(yaw);

  }));
}

  const P = project();
  const op = parseFloat(document.getElementById('op').value);
  if (op > 0.005) {
    const faces = [];
    P.forEach((pts, k) => {
      if (!visible[k]) return;
      for (const f of FACES) {
        const z = (pts[f[0]][2] + pts[f[1]][2] + pts[f[2]][2] + pts[f[3]][2]) / 4;
        faces.push({ k, f, z, pts });
      }
    });
    faces.sort((a, b) => a.z - b.z);
    for (const { k, f, pts } of faces) {
      ctx.beginPath();
      ctx.moveTo(pts[f[0]][0], pts[f[0]][1]);
      for (let i = 1; i < 4; i++) ctx.lineTo(pts[f[i]][0], pts[f[i]][1]);
      ctx.closePath();
      ctx.fillStyle = hexA(COLORS[k], op);
      ctx.fill();
    }
  }
  const edges = [];
  P.forEach((pts, k) => {
    if (!visible[k]) return;
    for (const [a, b] of EDGES)
      edges.push({ k, a: pts[a], b: pts[b], z: (pts[a][2] + pts[b][2]) / 2 });
  });
  edges.sort((e1, e2) => e1.z - e2.z);
  for (const e of edges) {
    const t = Math.max(0, Math.min(1, (e.z + 1.8) / 3.6));
    ctx.strokeStyle = hexA(COLORS[e.k], 0.35 + 0.6 * t);
    ctx.lineWidth = 1 + 1.1 * t;
    ctx.beginPath();
    ctx.moveTo(e.a[0], e.a[1]);
    ctx.lineTo(e.b[0], e.b[1]);
    ctx.stroke();
  }
}

function resize() {
  const r = cv.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  cv.width = Math.round(r.width * dpr);
  cv.height = Math.round(r.height * dpr);
  draw();
}
new ResizeObserver(resize).observe(cv.parentElement);

let drag = null;
cv.addEventListener('pointerdown', e => {
  drag = { x: e.clientX, y: e.clientY };
  cv.setPointerCapture(e.pointerId);
  cv.classList.add('dragging');
});
cv.addEventListener('pointermove', e => {
  if (!drag) return;
  yaw += (e.clientX - drag.x) * 0.008;
  pitch += (e.clientY - drag.y) * 0.008;
  pitch = Math.max(-1.5, Math.min(1.5, pitch));
  drag = { x: e.clientX, y: e.clientY };
  draw();
});
cv.addEventListener('pointerup', () => {
  drag = null;
  cv.classList.remove('dragging');
});
cv.addEventListener('wheel', e => {
  e.preventDefault();
  zoom *= Math.exp(-e.deltaY * 0.0012);
  zoom = Math.max(0.35, Math.min(4, zoom));
  draw();
}, { passive: false });

document.getElementById('op').addEventListener('input', draw);
document.getElementById('seed').addEventListener('change',
  e => loadSeed(+e.target.value));
document.getElementById('seed').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadSeed(+e.target.value);
});
document.getElementById('prev').addEventListener('click',
  () => loadSeed(+document.getElementById('seed').value - 1));
document.getElementById('next').addEventListener('click',
  () => loadSeed(+document.getElementById('seed').value + 1));

const spinBox = document.getElementById('spin');
spinBox.checked = !matchMedia('(prefers-reduced-motion: reduce)').matches;
let last = null;
function tick(t) {
  if (spinBox.checked && !drag) {
    if (last !== null) { yaw += (t - last) * 0.00012; draw(); }
  }
  last = t;
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

loadSeed(403);
resize();
</script>
